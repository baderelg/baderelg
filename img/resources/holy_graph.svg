  <circle cx="400" cy="400" r="230" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="400" r="170" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="400" r="110" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="400" r="50" fill="none" stroke="#0d9488" stroke-width="2" opacity="1"/>
    
  <!-- ==================== CIRCLE 0 ==================== -->
